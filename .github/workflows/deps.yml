name: deps-base

# Build the CACHED build-env base (ubuntu:24.04 + OpenROAD's compiled deps).
# Heavy (~1-2h cold) but rebuilt RARELY — re-run when the pinned commit's
# etc/DependencyInstaller.sh changes. release.yml / nightly.yml pull this image.
on:
  workflow_dispatch:
  push:
    paths:
      - deps/Dockerfile
      - upstream.yaml
      - .github/workflows/deps.yml

permissions:
  contents: read
  packages: write

env:
  DEPS_IMAGE: ghcr.io/${{ github.repository_owner }}/vyges-openroad-deps

jobs:
  build-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned commit
        id: pin
        run: echo "commit=$(grep -E '^\s*commit:' upstream.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push deps base
        run: |
          SHORT=$(echo "${{ steps.pin.outputs.commit }}" | cut -c1-12)
          DATE=$(date -u +%Y%m%d)
          docker build -f deps/Dockerfile \
            --build-arg OR_COMMIT="${{ steps.pin.outputs.commit }}" \
            -t "$DEPS_IMAGE:latest" \
            -t "$DEPS_IMAGE:$DATE" \
            -t "$DEPS_IMAGE:sha-$SHORT" \
            .
          docker push "$DEPS_IMAGE:latest"
          docker push "$DEPS_IMAGE:$DATE"
          docker push "$DEPS_IMAGE:sha-$SHORT"
