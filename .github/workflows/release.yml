name: release

# De-facto Vyges multi-arch build: native per-arch builds (deps image built
# on-the-fly per arch) + DIGEST-based manifest merge -> clean tags only
# (:sha-<short> / :<version> / :latest, multi-arch; no intermediate/attestation tags).
# OpenROAD is a large compile — expect ~1h/arch (matrix runs them in parallel).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version YYYY.MM.N (e.g. 2026.07.2)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/vyges-tools/vyges-openroad

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            docker_arch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            docker_arch: arm64
    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.arch }}
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Resolve pin
        id: pin
        run: |
          COMMIT=$(grep -E '^\s*commit:' upstream.yaml | awk '{print $2}')
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "short=$(echo "$COMMIT" | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/lib/jvm || true
          sudo docker image prune -af || true
          df -h /

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build deps image for ${{ matrix.arch }} (native)
        run: docker build --build-arg OR_COMMIT="${{ steps.pin.outputs.commit }}" -t oror-deps:local deps/

      - name: Compile OpenROAD + bundle (arch from uname -m)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p dist
          docker run --rm \
            -e OR_COMMIT="${{ steps.pin.outputs.commit }}" -e VERSION="$VERSION" -e OUT_DIR=/out \
            -v "$PWD/dist:/out" -v "$PWD/scripts:/scripts:ro" \
            oror-deps:local bash /scripts/build-bundle.sh

      - name: Smoke the tarball bundle
        run: bash scripts/smoke.sh "dist/vyges-openroad-${{ inputs.version }}-g${{ steps.pin.outputs.short }}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.arch }}
          path: dist/*.tar.gz

      - name: Build + push runtime image BY DIGEST (native ${{ matrix.docker_arch }})
        env:
          VERSION: ${{ inputs.version }}
          SHORT: ${{ steps.pin.outputs.short }}
          DA: ${{ matrix.docker_arch }}
        run: |
          docker buildx build -f Dockerfile.runtime \
            --build-arg BUNDLE_DIR="vyges-openroad-${VERSION}-g${SHORT}" \
            --build-arg VERSION="${VERSION}" \
            --platform "linux/${DA}" --provenance=false \
            --output "type=image,name=${IMAGE},push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/meta.json dist
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta.json)
          echo "pushed $IMAGE@$DIGEST"
          mkdir -p /tmp/digests && touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve pin
        id: pin
        run: |
          COMMIT=$(grep -E '^\s*commit:' upstream.yaml | awk '{print $2}')
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "short=$(echo "$COMMIT" | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Collect tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tarball-*
          merge-multiple: true

      - name: Collect digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests from digests
        id: manifest
        env:
          VERSION: ${{ inputs.version }}
          SHORT: ${{ steps.pin.outputs.short }}
        run: |
          SRCS=$(for f in /tmp/digests/*; do echo -n "${IMAGE}@sha256:$(basename "$f") "; done)
          for TAG in "sha-${SHORT}" "${VERSION}" latest; do
            docker buildx imagetools create -t "${IMAGE}:${TAG}" $SRCS
          done
          docker buildx imagetools inspect "${IMAGE}:${VERSION}"
          MDIG=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')
          echo "digest=$MDIG" >> "$GITHUB_OUTPUT"

      - name: GitHub Release (both-arch tarballs)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: vyges-openroad ${{ inputs.version }}
          body: |
            Mainline OpenROAD, reproducibly built by Vyges.
            **Multi-arch: linux/amd64 + linux/arm64** (native builds, digest-based manifest).
            - upstream commit: `${{ steps.pin.outputs.commit }}`
            - image: `${{ env.IMAGE }}:${{ inputs.version }}` (multi-arch manifest, also `:sha-…`, `:latest`)
            - manifest digest: `${{ steps.manifest.outputs.digest }}`
          files: dist/*.tar.gz

      - name: Append to index.json
        run: |
          bash scripts/update-index.sh \
            "${{ steps.pin.outputs.commit }}" "${{ steps.pin.outputs.short }}" \
            "${{ inputs.version }}" "${{ steps.manifest.outputs.digest }}" \
            "https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}/vyges-openroad-${{ inputs.version }}-g${{ steps.pin.outputs.short }}-linux-x86_64.tar.gz"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json && git commit -m "index: ${{ inputs.version }} (${{ steps.pin.outputs.short }}) multi-arch" && git push || echo "index unchanged"
